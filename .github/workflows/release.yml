name: Release and Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Monorepo package directory name (e.g. cpf-val, utils). PyPI name is read from pyproject.toml.'
        required: true
        type: string
      version:
        description: 'Version to release (e.g., 1.2.3 or 1.2.3.alpha1)'
        required: true
        type: string

permissions:
  contents: read

env:
  TWINE_USERNAME: __token__
  TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    uses: ./.github/workflows/.lint.yml

  test:
    uses: ./.github/workflows/.test.yml
    with:
      api-url: ${{ vars.BR_UTILS_API_URL }}
    secrets:
      api-token: ${{ secrets.BR_UTILS_API_TOKEN }}

  validate:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.validate.outputs.branch_name }}
      commit_sha: ${{ steps.validate.outputs.commit_sha }}
      tag_name: ${{ steps.validate.outputs.tag_name }}
      package: ${{ steps.validate.outputs.package }}
      pypi_name: ${{ steps.validate.outputs.pypi_name }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - id: validate
        env:
          INPUT_PACKAGE: ${{ inputs.package }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          PKG_DIR="$INPUT_PACKAGE"
          PKG_VERSION="$INPUT_VERSION"

          if [[ ! "$PKG_DIR" =~ ^[a-z0-9][a-z0-9._-]*$ ]]; then
            echo "❌ Invalid package directory name: '$PKG_DIR'"
            exit 1
          fi

          echo "🔍 Validating package and version..."
          echo "Monorepo directory: $PKG_DIR"
          echo "Version: $PKG_VERSION"

          if [ ! -d "packages/$PKG_DIR" ]; then
            echo "❌ Package '$PKG_DIR' does not exist in packages/ directory"
            exit 1
          fi

          if [ ! -f "packages/$PKG_DIR/pyproject.toml" ]; then
            echo "❌ Package '$PKG_DIR' does not have a 'pyproject.toml' file"
            exit 1
          fi

          PYPI_NAME=$(grep -E '^name = ' "packages/$PKG_DIR/pyproject.toml" | head -1 | sed -E 's/^name = "(.*)"/\1/')

          if [ -z "$PYPI_NAME" ]; then
            echo "❌ Could not read PyPI package name from packages/$PKG_DIR/pyproject.toml"
            exit 1
          fi

          echo "PyPI package name: $PYPI_NAME"
          echo "✅ Package '$PKG_DIR' exists"
          echo "✅ Package '$PKG_DIR' has a 'pyproject.toml' file"

          if [ "$PYPI_NAME" != "$PKG_DIR" ]; then
            echo "ℹ️  Monorepo directory and PyPI name differ (expected for some packages)"
          fi

          # Accepted versions format:
          # - stable: \d+\.\d+\.\d+
          # - pre-release: \d+\.\d+\.\d+\.(dev|alpha|beta|rc)\d+
          if [[ ! "$PKG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.(dev|alpha|beta|rc)[0-9]+)?$ ]]; then
            echo "❌ Version '$PKG_VERSION' does not match expected format:"
            echo "   Expected: X.Y.Z or X.Y.Z.{dev,alpha,beta,rc}N"
            echo "   Example: 1.2.3 or 1.2.3.alpha1"
            exit 1
          fi

          echo "✅ Version format is valid"

          TAG_NAME="${PYPI_NAME}@${PKG_VERSION}"
          echo "🔍 Checking if tag '$TAG_NAME' already exists..."

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "❌ Tag '$TAG_NAME' already exists"
            exit 1
          fi

          RELEASE_CHECK=$(curl -s \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" \
            -X GET \
            -H "Authorization: token $GITHUB_TOKEN")

          if echo "$RELEASE_CHECK" | jq -e '.id' >/dev/null 2>&1; then
            echo "❌ Release '$TAG_NAME' already exists"
            exit 1
          fi

          echo "✅ Tag '$TAG_NAME' is available"
          echo "✅ Release '$TAG_NAME' does not exist"

          BRANCH_NAME="${PKG_DIR}/main"
          echo "🔍 Checking if branch '$BRANCH_NAME' exists..."

          git fetch origin --quiet 2>/dev/null || true

          if ! git show-ref --verify --quiet "refs/heads/$BRANCH_NAME" && \
             ! git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME"; then
            echo "❌ Branch '$BRANCH_NAME' does not exist"
            echo "   Available branches:"
            git branch -a | grep -E "(main|$PKG_DIR)" || echo "   (none found)"
            exit 1
          fi

          echo "✅ Branch '$BRANCH_NAME' exists"

          if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME"; then
            COMMIT_SHA=$(git rev-parse "$BRANCH_NAME")
          else
            COMMIT_SHA=$(git rev-parse "origin/$BRANCH_NAME")
          fi

          echo "📝 Branch '$BRANCH_NAME' points to commit: $COMMIT_SHA"

          echo "package=$PKG_DIR" >> $GITHUB_OUTPUT
          echo "pypi_name=$PYPI_NAME" >> $GITHUB_OUTPUT
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

  create-release:
    needs: [lint, test, validate]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ needs.validate.outputs.tag_name }}
      package: ${{ needs.validate.outputs.package }}
      pypi_name: ${{ needs.validate.outputs.pypi_name }}
      version: ${{ needs.validate.outputs.version }}
      release_id: ${{ steps.create-release.outputs.release_id }}
    steps:
      - id: create-release
        run: |
          BRANCH_NAME="${{ needs.validate.outputs.branch_name }}"
          COMMIT_SHA="${{ needs.validate.outputs.commit_sha }}"
          TAG_NAME="${{ needs.validate.outputs.tag_name }}"
          PKG_DIR="${{ needs.validate.outputs.package }}"
          PYPI_NAME="${{ needs.validate.outputs.pypi_name }}"
          PKG_VERSION="${{ needs.validate.outputs.version }}"

          echo "🚀 Creating release '$TAG_NAME' on branch '$BRANCH_NAME'..."
          echo "Monorepo directory: $PKG_DIR"
          echo "PyPI package name: $PYPI_NAME"

          # Create release via GitHub API
          RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{
              \"target_commitish\": \"$COMMIT_SHA\",
              \"tag_name\": \"$TAG_NAME\",
              \"name\": \"$TAG_NAME\",
              \"draft\": false,
              \"prerelease\": $([[ "$PKG_VERSION" =~ \.(dev|alpha|beta|rc) ]] && echo "true" || echo "false")
            }")

          HTTP_CODE=$(echo "$RELEASE_RESPONSE" | tail -n1)
          RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Failed to create release. HTTP status: $HTTP_CODE"
            echo "Response: $RELEASE_BODY"
            exit 1
          fi

          RELEASE_ID=$(echo "$RELEASE_BODY" | jq -r '.id')

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "❌ Failed to get release ID from response"
            echo "Response: $RELEASE_BODY"
            exit 1
          fi

          echo "✅ Release created successfully (ID: $RELEASE_ID)"
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

  publish:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.x'

      - run: python -m pip install --upgrade pip
      - run: python require

      - name: Build and Publish Package
        run: |
          PKG_DIR="${{ needs.create-release.outputs.package }}"
          PYPI_NAME="${{ needs.create-release.outputs.pypi_name }}"
          PKG_VERSION="${{ needs.create-release.outputs.version }}"

          echo "📦 Building package '$PKG_DIR' (PyPI: $PYPI_NAME) version '$PKG_VERSION'..."
          python run build "$PKG_DIR" -v "$PKG_VERSION"

          echo "🚀 Publishing '$PYPI_NAME' to PyPI..."
          python run publish "$PKG_DIR"

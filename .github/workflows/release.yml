name: Release and Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Monorepo package directory name (e.g. cpf-val, utils). PyPI name is read from pyproject.toml.'
        required: true
        type: string
      version:
        description: 'Version to release (e.g., 1.2.3 or 1.2.3.alpha1). Leave empty to use the latest section in CHANGELOG.md'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  TWINE_USERNAME: __token__
  TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    uses: ./.github/workflows/.lint.yml
    with:
      packages: ${{ format('["{0}"]', inputs.package) }}
      python-versions: ${{ format('["{0}","{1}"]', vars.MIN_PYTHON_VERSION, vars.MAX_PYTHON_VERSION) }}

  test:
    uses: ./.github/workflows/.test.yml
    with:
      packages: ${{ format('["{0}"]', inputs.package) }}
      python-versions: ${{ format('["{0}","{1}"]', vars.MIN_PYTHON_VERSION, vars.MAX_PYTHON_VERSION) }}
      api-url: ${{ vars.BR_UTILS_API_URL }}
    secrets:
      api-token: ${{ secrets.BR_UTILS_API_TOKEN }}

  prepare-release:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.release.outputs.package }}
      pypi_name: ${{ steps.release.outputs.pypi_name }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_body: ${{ steps.release.outputs.release_body }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: release
        env:
          PACKAGE_NAME: ${{ inputs.package }}
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          [[ "$PACKAGE_NAME" =~ ^[a-z0-9][a-z0-9._-]*$ ]] || {
            echo "❌ Invalid package directory name: '$PACKAGE_NAME'"
            exit 1
          }

          echo "📦 Preparing release for package '$PACKAGE_NAME'..."

          if [ -n "$PACKAGE_VERSION" ]; then
            echo "📌 Using requested version: $PACKAGE_VERSION"
            OUTPUT_PATH=$(python run release "$PACKAGE_NAME" --version "$PACKAGE_VERSION")
          else
            echo "📌 Using latest version from CHANGELOG.md"
            OUTPUT_PATH=$(python run release "$PACKAGE_NAME")
          fi

          BASENAME=$(basename "$OUTPUT_PATH" .md)
          VERSION="${BASENAME#*@}"

          PYPI_NAME=$(grep -E '^name = ' "packages/$PACKAGE_NAME/pyproject.toml" | head -1 | sed -E 's/^name = "(.*)"/\1/')

          if [ -z "$PYPI_NAME" ]; then
            echo "❌ Could not read PyPI package name from packages/$PACKAGE_NAME/pyproject.toml"
            exit 1
          fi

          echo "package=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "pypi_name=$PYPI_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=${PYPI_NAME}@${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo 'release_body<<EOF'
            cat "$OUTPUT_PATH"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "📝 Release notes written to ${OUTPUT_PATH}"
          echo "✅ Release preparation complete"

  validate:
    name: Validate Git State
    needs: prepare-release
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.validate.outputs.branch_name }}
      commit_sha: ${{ steps.validate.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - id: validate
        env:
          PACKAGE_NAME: ${{ needs.prepare-release.outputs.package }}
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.version }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          set -euo pipefail

          echo "🔍 Validating release for package '$PACKAGE_NAME' version '$PACKAGE_VERSION'..."
          echo "🏷️  Tag: $TAG_NAME"
          echo ""

          echo "🔍 Checking if tag '$TAG_NAME' already exists..."

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "❌ Tag '$TAG_NAME' already exists"
            exit 1
          fi

          echo "🔍 Checking if GitHub Release '$TAG_NAME' already exists..."

          ENCODED_TAG=$(jq -rn --arg t "$TAG_NAME" '$t|@uri')
          RELEASE_CHECK=$(curl -s \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${ENCODED_TAG}" \
            -H "Authorization: token $GITHUB_TOKEN")

          if echo "$RELEASE_CHECK" | jq -e '.id' >/dev/null 2>&1; then
            echo "❌ Release '$TAG_NAME' already exists"
            exit 1
          fi

          echo "✅ Tag '$TAG_NAME' is available"
          echo "✅ Release '$TAG_NAME' does not exist"
          echo ""

          BRANCH_NAME="${PACKAGE_NAME}/main"
          echo "🔍 Checking if branch '$BRANCH_NAME' exists..."

          git fetch origin --quiet 2>/dev/null || true

          if ! git show-ref --verify --quiet "refs/heads/$BRANCH_NAME" && \
             ! git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME"; then
            echo "❌ Branch '$BRANCH_NAME' does not exist"
            echo "ℹ️  Available branches:"
            git branch -a | grep -E "(main|$PACKAGE_NAME)" || echo "   (none found)"
            exit 1
          fi

          echo "✅ Branch '$BRANCH_NAME' exists"

          if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME"; then
            COMMIT_SHA=$(git rev-parse "$BRANCH_NAME")
          else
            COMMIT_SHA=$(git rev-parse "origin/$BRANCH_NAME")
          fi

          echo "📝 Branch '$BRANCH_NAME' points to commit: $COMMIT_SHA"
          echo "✅ Git state validation complete"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

  publish:
    needs:
      - lint
      - test
      - prepare-release
      - validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - run: python -m pip install --upgrade pip
      - run: python require --dev-only

      - name: Build and Publish Package
        run: |
          PKG_DIR="${{ needs.prepare-release.outputs.package }}"
          PYPI_NAME="${{ needs.prepare-release.outputs.pypi_name }}"
          PKG_VERSION="${{ needs.prepare-release.outputs.version }}"

          echo "📦 Building package '$PKG_DIR' (PyPI: $PYPI_NAME) version '$PKG_VERSION'..."
          python run build "$PKG_DIR" -v "$PKG_VERSION"

          echo "🚀 Publishing '$PYPI_NAME' to PyPI..."
          python run publish "$PKG_DIR"

  create-release:
    name: Create GitHub Release
    needs:
      - prepare-release
      - validate
      - publish
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ needs.prepare-release.outputs.tag_name }}
      package: ${{ needs.prepare-release.outputs.package }}
      pypi_name: ${{ needs.prepare-release.outputs.pypi_name }}
      version: ${{ needs.prepare-release.outputs.version }}
      release_id: ${{ steps.create-release.outputs.release_id }}
    steps:
      - id: create-release
        env:
          BRANCH_NAME: ${{ needs.validate.outputs.branch_name }}
          COMMIT_SHA: ${{ needs.validate.outputs.commit_sha }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_BODY: ${{ needs.prepare-release.outputs.release_body }}
        run: |
          set -euo pipefail

          if [[ "$PACKAGE_VERSION" =~ \.(dev|alpha|beta|rc)[0-9]+$ ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "🚀 Creating GitHub Release '$TAG_NAME'..."
          echo "🌿 Target branch: $BRANCH_NAME"
          echo "📝 Target commit: $COMMIT_SHA"
          echo "🏷️  Prerelease: $PRERELEASE"
          echo ""

          PAYLOAD=$(jq -n \
            --arg target "$COMMIT_SHA" \
            --arg tag "$TAG_NAME" \
            --arg name "$TAG_NAME" \
            --arg body "$RELEASE_BODY" \
            --argjson prerelease "$PRERELEASE" \
            '{target_commitish: $target, tag_name: $tag, name: $name, body: $body, draft: false, prerelease: $prerelease}')

          RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RELEASE_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Failed to create release. HTTP status: $HTTP_CODE"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi

          RELEASE_ID=$(echo "$RESPONSE_BODY" | jq -r '.id')

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "❌ Failed to get release ID from response"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi

          echo "✅ Release created successfully (ID: $RELEASE_ID)"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
